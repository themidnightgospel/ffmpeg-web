name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck · Lint · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck (astro check)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + component tests
        run: npm run test

      - name: Build (static site)
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  matrix-sample:
    name: Conversion matrix (PR sample)
    if: github.event_name == 'pull_request'
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install ffmpeg (fixtures + ffprobe validation)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      # Sample: one representative pair per source format keeps PRs fast.
      - name: Run sampled conversion matrix
        run: npm run test:matrix
        env:
          MATRIX_SAMPLE: '1'

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-sample-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
